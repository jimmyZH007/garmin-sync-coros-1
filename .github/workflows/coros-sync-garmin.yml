name: coros-sync-garmin

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,14 * * *'  # 调整到非高峰时段

env:
  GITHUB_NAME: jimmyZH007
  GITHUB_EMAIL: junpeng18@foxmail.com
  GARMIN_AUTH_DOMAIN: ${{ secrets.GARMIN_AUTH_DOMAIN }}
  GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  COROS_EMAIL: ${{ secrets.COROS_EMAIL }}
  COROS_PASSWORD: ${{ secrets.COROS_PASSWORD }}
  RUN_TYPE: coros_to_garmin

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Restore Garmin Token File
        run: |
          mkdir -p db
          echo "${{ secrets.GARMIN_DB_BASE64 }}" | base64 -d > db/garmin.db
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Sync Script
        run: |
          if [ "$RUN_TYPE" = "garmin_to_coros" ]; then
            python scripts/garmin/garmin_sync_coros.py
          else
            python scripts/coros/coros_sync_garmin.py
          fi
      
      - name: Commit and Push
        run: |
          git config --local user.email "${{ env.GITHUB_EMAIL }}"
          git config --local user.name "${{ env.GITHUB_NAME }}"
          git add .
          git commit -m "chore: sync activities $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "Nothing to push"
