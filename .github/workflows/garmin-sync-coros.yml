name: garmin-sync-coros

on:
  workflow_dispatch: # 允许手动触发
  schedule:
    # 调整为每天运行两次，避免过于频繁触发429错误
    # 原 cron: '0 1,8,21 * * ?'  (UTC 01:00, 08:00, 21:00)
    # 现调整为 UTC 时间 02:00 和 14:00 (即北京时间 10:00 和 22:00)
    - cron: '0 2,14 * * *'

env:
  GITHUB_NAME: jimmyZH007
  GITHUB_EMAIL: junpeng18@foxmail.com
  ## 佳明配置
  GARMIN_AUTH_DOMAIN: ${{ secrets.GARMIN_AUTH_DOMAIN }}
  GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_NEWEST_NUM: ${{ secrets.GARMIN_NEWEST_NUM }}

  ## Coros配置
  COROS_EMAIL: ${{ secrets.COROS_EMAIL }}
  COROS_PASSWORD: ${{ secrets.COROS_PASSWORD }}

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # 1. 获取仓库代码
      - uses: actions/checkout@v3

      # 2. 设置Python环境
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 恢复Garmin认证令牌 (解决“令牌过期/缺失”问题的关键步骤)
      - name: Restore Garmin Authentication Token
        env:
          GARMIN_TOKEN_BASE64: ${{ secrets.GARMIN_TOKEN_BASE64 }}
        run: |
          # 根据您项目使用的Garmin库（如garth）确定令牌文件路径
          # 常见路径1: 项目目录下的 `db/garmin.db`
          mkdir -p db
          if [ -n "$GARMIN_TOKEN_BASE64" ]; then
            echo "$GARMIN_TOKEN_BASE64" | base64 -d > db/garmin.db
            echo "✅ Garmin token restored to db/garmin.db"
          else
            echo "⚠️  Secret GARMIN_TOKEN_BASE64 is empty. Script will attempt fresh login (may fail with 429)."
          fi
          # 常见路径2: 用户目录下的 `~/.garmin/`
          # mkdir -p ~/.garmin
          # echo "$GARMIN_TOKEN_BASE64" | base64 -d > ~/.garmin/oauth1_token.json

      # 4. 缓存pip依赖以加速构建
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 5. 安装Python依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 6. 运行Garmin至高驰的同步主脚本
      - name: Run Garmin to Coros Sync
        run: |
          python scripts/garmin/garmin_sync_coros.py
        # 可选：增加超时设置，防止任务卡死
        timeout-minutes: 10

      # 7. 提交并推送同步产生的新数据或更新的令牌文件
      - name: Commit and Push Updates
        run: |
          git config --global user.email "${{ env.GITHUB_EMAIL }}"
          git config --global user.name "${{ env.GITHUB_NAME }}"
          # 检查是否有文件变更（如新的活动数据、更新的令牌文件）
          git add -A
          # 使用时间戳作为提交信息的一部分，便于追溯
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "chore: sync garmin activities at $TIMESTAMP" || echo "No changes to commit"
          git push || echo "Nothing to push"
