name: garmin-sync-coros

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2,14 * * *'  # 每天运行两次，避免频繁触发429

env:
  GITHUB_NAME: jimmyZH007
  GITHUB_EMAIL: junpeng18@foxmail.com
  GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
  GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
  GARMIN_NEWEST_NUM: ${{ secrets.GARMIN_NEWEST_NUM }}
  COROS_EMAIL: ${{ secrets.COROS_EMAIL }}
  COROS_PASSWORD: ${{ secrets.COROS_PASSWORD }}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 增加超时时间

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # 关键步骤：恢复Garmin令牌
      - name: Restore Garmin Token
        env:
          GARMIN_TOKEN_BASE64: ${{ secrets.GARMIN_TOKEN_BASE64 }}
        run: |
          echo "正在恢复Garmin令牌..."
          mkdir -p db
          
          if [ -n "$GARMIN_TOKEN_BASE64" ]; then
            # 解码并保存令牌文件
            echo "$GARMIN_TOKEN_BASE64" | base64 -d > db/garmin.db
            
            # 验证令牌文件
            if [ -s "db/garmin.db" ]; then
              echo "✅ 令牌文件恢复成功"
              echo "文件大小: $(wc -c < db/garmin.db) 字节"
              echo "文件类型: $(file db/garmin.db)"
            else
              echo "❌ 令牌文件为空"
              exit 1
            fi
          else
            echo "❌ GARMIN_TOKEN_BASE64 环境变量为空"
            exit 1
          fi
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 先运行一个简单的测试验证令牌
      - name: Test Garmin Authentication
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          echo "测试Garmin认证..."
          python -c "
import os
from garth import Client

client = Client()
try:
    client.load('db/garmin.db')
    profile = client.connectapi('/userprofile')
    print(f'✅ 认证成功！用户: {profile.get(\"userName\")}')
except Exception as e:
    print(f'❌ 认证失败: {e}')
    # 如果令牌无效，尝试重新登录
    try:
        email = os.environ.get('GARMIN_EMAIL')
        password = os.environ.get('GARMIN_PASSWORD')
        if email and password:
            client.login(email, password)
            client.dump('db/garmin.db')
            print('✅ 重新登录成功，已保存新令牌')
    except Exception as e2:
        print(f'❌ 重新登录也失败: {e2}')
          "
      
      - name: Run Garmin Sync
        run: |
          echo "开始同步..."
          # 添加重试逻辑
          for i in {1..3}; do
            echo "尝试第 $i 次..."
            python scripts/garmin/garmin_sync_coros.py && break
            echo "同步失败，等待30秒后重试..."
            sleep 30
          done
      
      - name: Commit and Push
        run: |
          git config --global user.email "${{ env.GITHUB_EMAIL }}"
          git config --global user.name "${{ env.GITHUB_NAME }}"
          git add .
          git commit -m "chore: sync activities $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "Nothing to push"
